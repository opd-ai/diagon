# Diagon OpenBSD autoinstall(8) response file (analog to profiles/myprofile.preseed).
# Answers the installer prompts for a deterministic, unattended install that
# mirrors the Debian preseed intent: UTC timezone and no interactive root login.
#
# Passwords are intentionally locked ("*"). Operators inject real credentials
# out of band via secrets, exactly like the Debian preseed leaves root-login
# disabled. Do not hardcode secrets in this file.
System hostname = diagon
DNS domain name = localdomain
Password for root account = *
Allow root ssh login = no
Change the default console to com0 = yes
Setup a user = diagon
Password for user = *
What timezone are you in = UTC
Which disk is the root disk = sd0
Use (W)hole disk MBR, whole disk (G)PT or (E)dit = whole
URL to autopartitioning template for disklabel = 
Location of sets = http
Unable to connect using https. Use http instead = yes
Set name(s) = +* -game* -x* -man*
Directory does not contain SHA256.sig. Continue without verification = yes
Location of sets = done
Exit to (S)hell, (H)alt or (R)eboot = reboot
