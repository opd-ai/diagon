name: Build Debian Installer ISO

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install simple-cdd
        run: |
          sudo apt-get update
          sudo apt-get install -y simple-cdd *archive-keyring

      - name: Import Debian Archive Keys
        run: |
          # Import Debian archive signing keys
          gpg --keyserver keyserver.ubuntu.com --recv-keys B8E5F13176D2A7A75220028078DBA3BC47EF2265 || true
          gpg --keyserver keyserver.ubuntu.com --recv-keys B8B80B5B623EAB6AD8775C45B7C5D7D6350947F8 || true
          # Export to the system keyring
          gpg --export B8E5F13176D2A7A75220028078DBA3BC47EF2265 B8B80B5B623EAB6AD8775C45B7C5D7D6350947F8 | sudo tee -a /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null || true

      - name: Build ISO
        run: |
          mkdir build
          cp -r profiles build/
          cd build
          build-simple-cdd --profiles myprofile --dist forky

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/images/*.iso"
          token: ${{ secrets.GITHUB_TOKEN }}