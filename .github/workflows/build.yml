name: Debian CI Stages

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-integration-matrix:
    name: Prepare integration matrix
    runs-on: ubuntu-latest
    outputs:
      ci_matrix: ${{ steps.matrix.outputs.ci_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI matrix from integration matrix file
        id: matrix
        run: |
          ci_matrix=$(jq -c '{include: [.environments[] | {
            environment: .environment,
            debian_codename: .debian_codename,
            go_version: .go_version,
            diagon_repo: .components.diagon.repo,
            diagon_version: .components.diagon.version,
            diagon_build_input: .components.diagon.build_input,
            store_repo: .components.store.repo,
            store_version: .components.store.version,
            store_build_input: .components.store.build_input,
            paywall_repo: .components.paywall.repo,
            paywall_version: .components.paywall.version,
            paywall_build_input: .components.paywall.build_input,
            i2pd_repo: .components.i2pd.repo,
            i2pd_version: .components.i2pd.version,
            i2pd_build_input: .components.i2pd.build_input,
            service_contract_primary: .contract_fixtures.primary,
            service_contract_fixtures: .contract_fixtures.service_contracts
          }]}' .github/integration-matrix.json)
          echo "ci_matrix=$ci_matrix" >> "$GITHUB_OUTPUT"

  stage-1-static-checks:
    name: Stage 1 - Static checks (${{ matrix.environment }})
    needs: prepare-integration-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Validate workflow and shell scripts
        uses: rhysd/actionlint@v1

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Upload stage matrix metadata
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-metadata-${{ matrix.environment }}
          path: |
            .github/workflows/build.yml

  stage-2-build-artifacts:
    name: Stage 2 - Build artifacts (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-1-static-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Build diagonctl
        run: |
          mkdir -p artifacts/bin
          go build -o artifacts/bin/diagonctl ./cmd/diagonctl

      - name: Emit build metadata
        run: |
          mkdir -p artifacts/metadata
          cat > artifacts/metadata/build-metadata.json <<EOF
          {
            "environment": "${{ matrix.environment }}",
            "debian_codename": "${{ matrix.debian_codename }}",
            "components": {
              "diagon": {
                "repo": "${{ matrix.diagon_repo }}",
                "version": "${{ matrix.diagon_version }}",
                "build_input": "${{ matrix.diagon_build_input }}",
                "artifact": "artifacts/bin/diagonctl"
              },
              "store": {
                "repo": "${{ matrix.store_repo }}",
                "version": "${{ matrix.store_version }}",
                "build_input": "${{ matrix.store_build_input }}",
                "artifact": "external-managed"
              },
              "paywall": {
                "repo": "${{ matrix.paywall_repo }}",
                "version": "${{ matrix.paywall_version }}",
                "build_input": "${{ matrix.paywall_build_input }}",
                "artifact": "external-managed"
              },
              "i2pd": {
                "repo": "${{ matrix.i2pd_repo }}",
                "version": "${{ matrix.i2pd_version }}",
                "build_input": "${{ matrix.i2pd_build_input }}",
                "artifact": "debian-package"
              }
            }
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-build-${{ matrix.environment }}
          path: |
            artifacts/bin/diagonctl
            artifacts/metadata/build-metadata.json

  stage-3-unit-tests:
    name: Stage 3 - Unit tests (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-2-build-artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Run Go unit tests
        run: go test ./...

  stage-4-integration-bootstrap:
    name: Stage 4 - Integration bootstrap (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-3-unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Bootstrap local integration stubs
        run: |
          mkdir -p artifacts .tmp
          cat > .tmp/stub_service.py <<'PY'
          import argparse
          from http.server import BaseHTTPRequestHandler, HTTPServer


          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(b'{"status":"ok"}')

              def log_message(self, format, *args):
                  return


          if __name__ == "__main__":
              parser = argparse.ArgumentParser()
              parser.add_argument("--port", type=int, required=True)
              args = parser.parse_args()

              server = HTTPServer(("127.0.0.1", args.port), Handler)
              server.serve_forever()
          PY

          nohup python3 .tmp/stub_service.py --port 7070 > artifacts/i2pd.log 2>&1 &
          echo $! > .tmp/i2pd.pid
          sleep 1

          nohup python3 .tmp/stub_service.py --port 8081 > artifacts/paywall.log 2>&1 &
          echo $! > .tmp/paywall.pid
          sleep 1

          nohup python3 .tmp/stub_service.py --port 8080 > artifacts/store.log 2>&1 &
          echo $! > .tmp/store.pid
          sleep 1

      - name: Stage 4 live readiness probe
        run: |
          go run ./cmd/diagonctl \
            --profile-dir profiles \
            --profile-name myprofile \
            --policy-file profiles/validation-policy.json \
            --service-contract-file "${{ matrix.service_contract_primary }}" \
            --probe-live \
            --probe-timeout 45s \
            --probe-interval 250ms \
            --format json | tee artifacts/service-probe.json

      - name: Cleanup integration stubs
        if: always()
        run: |
          for pid_file in .tmp/*.pid; do
            if [ -f "$pid_file" ]; then
              kill "$(cat "$pid_file")" || true
            fi
          done

      - name: Upload integration probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-4-probe-${{ matrix.environment }}
          path: |
            artifacts/service-probe.json
            artifacts/i2pd.log
            artifacts/paywall.log
            artifacts/store.log
          if-no-files-found: error

  stage-5-contract-tests:
    name: Stage 5 - Contract tests (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-4-integration-bootstrap
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Validate profile and matrix service contract fixtures
        run: |
          mkdir -p artifacts/contract-tests
          mapfile -t fixtures < <(echo '${{ toJson(matrix.service_contract_fixtures) }}' | jq -r '.[]')
          for fixture in "${fixtures[@]}"; do
            name=$(basename "$fixture" .json)
            go run ./cmd/diagonctl \
              --profile-dir profiles \
              --profile-name myprofile \
              --policy-file profiles/validation-policy.json \
              --service-contract-file "$fixture" \
              --format json | tee "artifacts/contract-tests/${name}.json"
          done

      - name: Upload contract validation result
        uses: actions/upload-artifact@v4
        with:
          name: stage-5-contract-${{ matrix.environment }}
          path: artifacts/contract-tests/*.json

  stage-6-e2e-smoke:
    name: Stage 6 - End-to-end smoke (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-5-contract-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Execute transaction smoke harness
        run: |
          mkdir -p artifacts .tmp
          cat > .tmp/smoke_services.py <<'PY'
          import json
          import threading
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from urllib.request import Request, urlopen


          class PaywallHandler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path != "/pay":
                      self.send_response(404)
                      self.end_headers()
                      return
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(json.dumps({"settled": True}).encode("utf-8"))

              def log_message(self, *_args):
                  return


          class StoreHandler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path != "/checkout":
                      self.send_response(404)
                      self.end_headers()
                      return

                  req = Request("http://127.0.0.1:8081/pay", method="POST", data=b"{}")
                  with urlopen(req, timeout=5) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))

                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(json.dumps({"checkout": "ok", "paywall": payload}).encode("utf-8"))

              def log_message(self, *_args):
                  return


          def run_server(server):
              server.serve_forever()


          paywall = HTTPServer(("127.0.0.1", 8081), PaywallHandler)
          store = HTTPServer(("127.0.0.1", 8080), StoreHandler)

          paywall_thread = threading.Thread(target=run_server, args=(paywall,), daemon=True)
          store_thread = threading.Thread(target=run_server, args=(store,), daemon=True)
          paywall_thread.start()
          store_thread.start()

          req = Request("http://127.0.0.1:8080/checkout", method="POST", data=b"{}")
          with urlopen(req, timeout=5) as resp:
              smoke_result = {
                  "status_code": resp.status,
                  "response": json.loads(resp.read().decode("utf-8")),
                  "wallet_mode": "stubbed-test-wallet"
              }

          with open("artifacts/stage-6-smoke.json", "w", encoding="utf-8") as fh:
              json.dump(smoke_result, fh, indent=2)

          assert smoke_result["status_code"] == 200
          assert smoke_result["response"]["paywall"]["settled"] is True

          paywall.shutdown()
          store.shutdown()
          PY

          python3 .tmp/smoke_services.py

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-6-smoke-${{ matrix.environment }}
          path: artifacts/stage-6-smoke.json

  stage-7-packaging-verification:
    name: Stage 7 - Packaging verification (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-6-e2e-smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Verify Debian build toolchain installability
        run: |
          sudo apt-get update
          sudo apt-get install -y simple-cdd debian-archive-keyring
          dpkg -s simple-cdd >/dev/null

      - name: Import Debian archive keys (best effort)
        run: |
          gpg --keyserver keyserver.ubuntu.com --recv-keys B8E5F13176D2A7A75220028078DBA3BC47EF2265 || true
          gpg --keyserver keyserver.ubuntu.com --recv-keys B8B80B5B623EAB6AD8775C45B7C5D7D6350947F8 || true
          gpg --export B8E5F13176D2A7A75220028078DBA3BC47EF2265 B8B80B5B623EAB6AD8775C45B7C5D7D6350947F8 | sudo tee -a /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null || true

      - name: Build Debian installer ISO
        run: |
          mkdir -p build
          cp -r profiles build/
          cd build
          build-simple-cdd --profiles myprofile --dist ${{ matrix.debian_codename }}

      - name: Verify packaging outputs
        run: |
          test -d build/images
          ls -1 build/images/*.iso > build/iso-list.txt

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage-7-packaging-${{ matrix.environment }}
          path: |
            build/iso-list.txt
            build/images/*.iso

  stage-8-release-bundle:
    name: Stage 8 - Signing and release bundle (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-7-packaging-verification
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Download packaging artifacts
        uses: actions/download-artifact@v4
        with:
          name: stage-7-packaging-${{ matrix.environment }}
          path: release-artifacts

      - name: Generate checksums and version manifest
        run: |
          mkdir -p release-artifacts/manifest
          find release-artifacts -type f -name '*.iso' -print0 | xargs -0 sha256sum > release-artifacts/manifest/SHA256SUMS
          cat > release-artifacts/manifest/version-manifest.json <<EOF
          {
            "environment": "${{ matrix.environment }}",
            "debian_codename": "${{ matrix.debian_codename }}",
            "components": {
              "diagon": "${{ matrix.diagon_version }}",
              "store": "${{ matrix.store_version }}",
              "paywall": "${{ matrix.paywall_version }}",
              "i2pd": "${{ matrix.i2pd_version }}"
            }
          }
          EOF

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-8-release-bundle-${{ matrix.environment }}
          path: |
            release-artifacts/**/*.iso
            release-artifacts/manifest/SHA256SUMS
            release-artifacts/manifest/version-manifest.json

      - name: Publish GitHub release assets
        if: github.event_name == 'release'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-artifacts/**/*.iso,release-artifacts/manifest/SHA256SUMS,release-artifacts/manifest/version-manifest.json"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true

  quality-gate-merge:
    name: Quality Gate - Merge (Stages 1-7)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs:
      - stage-1-static-checks
      - stage-2-build-artifacts
      - stage-3-unit-tests
      - stage-4-integration-bootstrap
      - stage-5-contract-tests
      - stage-6-e2e-smoke
      - stage-7-packaging-verification
    runs-on: ubuntu-latest
    steps:
      - name: Confirm merge quality gate
        run: echo "Stages 1 through 7 passed. Merge quality gate satisfied."

  quality-gate-release:
    name: Quality Gate - Release (Stage 8)
    if: github.event_name == 'release'
    needs:
      - stage-8-release-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Confirm release quality gate
        run: echo "Stage 8 passed. Release quality gate satisfied."