name: Debian CI Stages

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-integration-matrix:
    name: Prepare integration matrix
    runs-on: ubuntu-latest
    outputs:
      ci_matrix: ${{ steps.matrix.outputs.ci_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI matrix from integration matrix file
        id: matrix
        run: bash .github/scripts/build-ci-matrix.sh

  stage-1-static-checks:
    name: Stage 1 - Static checks (${{ matrix.environment }})
    needs: prepare-integration-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Validate workflow and shell scripts
        run: bash .github/scripts/run-actionlint.sh

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Verify pinned component refs
        env:
          COMPONENTS_JSON: ${{ toJson(matrix.components) }}
        run: bash .github/scripts/verify-component-refs.sh

      - name: Run matrix Go static checks
        env:
          COMPONENTS_JSON: ${{ toJson(matrix.components) }}
        run: bash .github/scripts/run-matrix-static-checks.sh

      - name: Upload stage matrix metadata
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-metadata-${{ matrix.environment }}
          path: |
            .github/workflows/build.yml

  stage-2-build-artifacts:
    name: Stage 2 - Build artifacts (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-1-static-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Build diagonctl
        env:
          GO_VERSION: ${{ matrix.go_version }}
          DEBIAN_CODENAME: ${{ matrix.debian_codename }}
          STORE_BUILD_INPUT: ${{ matrix.store_build_input }}
          PAYWALL_BUILD_INPUT: ${{ matrix.paywall_build_input }}
        run: bash .github/scripts/build-artifacts.sh

      - name: Emit build metadata
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          DEBIAN_VERSION: ${{ matrix.debian_version }}
          DEBIAN_CODENAME: ${{ matrix.debian_codename }}
          GO_VERSION: ${{ matrix.go_version }}
          PACKAGE_DEPENDENCIES: ${{ toJson(matrix.package_dependencies) }}
          COMPONENTS_JSON: ${{ toJson(matrix.components) }}
        run: bash .github/scripts/emit-build-metadata.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-build-${{ matrix.environment }}
          path: |
            artifacts/bin/diagonctl
            artifacts/bin/store
            artifacts/bin/paywall
            artifacts/metadata/build-metadata.json

  stage-3-unit-tests:
    name: Stage 3 - Unit tests (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-2-build-artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Run Go unit tests
        env:
          COMPONENTS_JSON: ${{ toJson(matrix.components) }}
        run: bash .github/scripts/run-matrix-unit-tests.sh

  stage-4-integration-bootstrap:
    name: Stage 4 - Integration bootstrap (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-3-unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Bootstrap local integration stubs
        run: bash .github/scripts/bootstrap-integration-stubs.sh

      - name: Stage 4 live readiness probe
        run: |
          go run ./cmd/diagonctl \
            --profile-dir profiles \
            --profile-name myprofile \
            --policy-file profiles/validation-policy.json \
            --bootstrap-profile-file profiles/local-single-host-bootstrap.json \
            --service-contract-file "${{ matrix.service_contract_primary }}" \
            --probe-live \
            --probe-timeout 45s \
            --probe-interval 250ms \
            --format json | tee artifacts/service-probe.json

      - name: Stage 4 readiness-timeout regression
        env:
          SERVICE_CONTRACT_PRIMARY: ${{ matrix.service_contract_primary }}
        run: bash .github/scripts/stage4-readiness-timeout-regression.sh

      - name: Cleanup integration stubs
        if: always()
        run: bash .github/scripts/cleanup-integration-stubs.sh

      - name: Upload integration probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-4-probe-${{ matrix.environment }}
          path: |
            artifacts/service-probe.json
            artifacts/service-probe-timeout.json
            artifacts/i2pd.log
            artifacts/paywall.log
            artifacts/store.log
            artifacts/store-tunnel.log
            artifacts/paywall-tunnel.log
          if-no-files-found: error

  stage-5-contract-tests:
    name: Stage 5 - Contract tests (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-4-integration-bootstrap
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Validate profile and matrix service contract fixtures
        env:
          PRIMARY: ${{ matrix.service_contract_primary }}
          CONTRACTS_JSON: ${{ toJson(matrix.service_contract_fixtures) }}
        run: bash .github/scripts/validate-contract-fixtures.sh

      - name: Upload contract validation result
        uses: actions/upload-artifact@v4
        with:
          name: stage-5-contract-${{ matrix.environment }}
          path: artifacts/contract-tests/*.json

  stage-6-e2e-smoke:
    name: Stage 6 - End-to-end smoke (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-5-contract-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Emit release-candidate smoke plan and operator runbook
        run: |
          mkdir -p artifacts
          go run ./cmd/diagonctl \
            --profile-dir profiles \
            --profile-name myprofile \
            --policy-file profiles/validation-policy.json \
            --bootstrap-profile-file profiles/local-single-host-bootstrap.json \
            --service-contract-file "${{ matrix.service_contract_primary }}" \
            --integration-matrix-file .github/integration-matrix.json \
            --integration-environment "${{ matrix.environment }}" \
            --emit-release-smoke-file artifacts/stage-6-smoke-plan.json \
            --emit-operator-runbook-file artifacts/operator-runbook.md \
            --emit-bootstrap-quickstart-file artifacts/bootstrap-quickstart.md \
            --emit-wallet-validation-checklist-file artifacts/wallet-validation-checklist.md \
            --format json > artifacts/stage-6-smoke-metadata.json

      - name: Execute transaction smoke harness
        run: |
          go run ./cmd/diagon-smoke-harness \
            --plan artifacts/stage-6-smoke-plan.json \
            --output artifacts/stage-6-smoke.json \
            --expected-wallet-mode stubbed

      - name: Assert stubbed wallet mode for CI smoke
        run: bash .github/scripts/assert-stubbed-wallet-mode.sh

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-6-smoke-${{ matrix.environment }}
          path: |
            artifacts/stage-6-smoke.json
            artifacts/stage-6-smoke-plan.json
            artifacts/stage-6-smoke-metadata.json
            artifacts/operator-runbook.md
            artifacts/bootstrap-quickstart.md
            artifacts/wallet-validation-checklist.md

  stage-7-packaging-verification:
    name: Stage 7 - Packaging verification (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-6-e2e-smoke
    runs-on: ubuntu-latest
    container:
      image: debian:${{ matrix.debian_codename }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Install CI base tooling
        run: |
          apt-get update
          apt-get install -y ca-certificates curl git gnupg jq

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Emit Debian dependency manifest
        run: |
          mkdir -p artifacts
          go run ./cmd/diagonctl \
            --profile-dir profiles \
            --profile-name myprofile \
            --policy-file profiles/validation-policy.json \
            --integration-matrix-file .github/integration-matrix.json \
            --integration-environment "${{ matrix.environment }}" \
            --emit-debian-dependency-manifest-file artifacts/debian-dependency-manifest.json \
            --format json > artifacts/stage-7-dependency-metadata.json

      - name: Verify Debian build toolchain installability
        env:
          MATRIX_CODENAME: ${{ matrix.debian_codename }}
        run: bash .github/scripts/verify-debian-toolchain.sh

      - name: Import Debian archive keys (best effort)
        run: bash .github/scripts/import-debian-keys.sh

      - name: Build Debian installer ISO
        env:
          MATRIX_CODENAME: ${{ matrix.debian_codename }}
        run: bash .github/scripts/build-debian-iso.sh

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage-7-packaging-${{ matrix.environment }}
          path: |
            artifacts/debian-dependency-manifest.json
            artifacts/stage-7-dependency-metadata.json
            build/iso-list.txt
            build/images/*.iso

  stage-7b-fallback-compose-bundle:
    name: Stage 7b - Fallback compose bundle (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-6-e2e-smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Emit fallback compose/service bundle
        run: |
          mkdir -p artifacts
          go run ./cmd/diagonctl \
            --profile-dir profiles \
            --profile-name myprofile \
            --policy-file profiles/validation-policy.json \
            --bootstrap-profile-file profiles/local-single-host-bootstrap.json \
            --service-contract-file "${{ matrix.service_contract_primary }}" \
            --integration-matrix-file .github/integration-matrix.json \
            --integration-environment "${{ matrix.environment }}" \
            --emit-debian-compose-bundle-file artifacts/debian-compose-bundle.json \
            --format json > artifacts/stage-7b-fallback-metadata.json

      - name: Validate fallback bundle content
        run: bash .github/scripts/validate-fallback-bundle.sh

      - name: Upload fallback bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage-7b-fallback-${{ matrix.environment }}
          path: |
            artifacts/debian-compose-bundle.json
            artifacts/stage-7b-fallback-metadata.json

  stage-8-release-bundle:
    name: Stage 8 - Signing and release bundle (${{ matrix.environment }})
    needs:
      - prepare-integration-matrix
      - stage-7-packaging-verification
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs['prepare-integration-matrix'].outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Download packaging artifacts
        uses: actions/download-artifact@v4
        with:
          name: stage-7-packaging-${{ matrix.environment }}
          path: release-artifacts

      - name: Generate checksums, release baseline, and operator runbook
        run: |
          mkdir -p release-artifacts/manifest
          find release-artifacts -type f -name '*.iso' -print0 | xargs -0 sha256sum > release-artifacts/manifest/SHA256SUMS
          go run ./cmd/diagonctl \
            --profile-dir profiles \
            --profile-name myprofile \
            --policy-file profiles/validation-policy.json \
            --bootstrap-profile-file profiles/local-single-host-bootstrap.json \
            --service-contract-file "${{ matrix.service_contract_primary }}" \
            --integration-matrix-file .github/integration-matrix.json \
            --integration-environment "${{ matrix.environment }}" \
            --emit-release-baseline-file release-artifacts/manifest/version-manifest.json \
            --emit-operator-runbook-file release-artifacts/manifest/operator-runbook.md \
            --emit-bootstrap-quickstart-file release-artifacts/manifest/bootstrap-quickstart.md \
            --emit-wallet-validation-checklist-file release-artifacts/manifest/wallet-validation-checklist.md \
            --format json > release-artifacts/manifest/release-metadata.json

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-8-release-bundle-${{ matrix.environment }}
          path: |
            release-artifacts/**/*.iso
            release-artifacts/manifest/SHA256SUMS
            release-artifacts/manifest/version-manifest.json
            release-artifacts/manifest/operator-runbook.md
            release-artifacts/manifest/bootstrap-quickstart.md
            release-artifacts/manifest/wallet-validation-checklist.md
            release-artifacts/manifest/release-metadata.json

      - name: Publish GitHub release assets
        if: github.event_name == 'release'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-artifacts/**/*.iso,release-artifacts/manifest/SHA256SUMS,release-artifacts/manifest/version-manifest.json,release-artifacts/manifest/operator-runbook.md,release-artifacts/manifest/bootstrap-quickstart.md,release-artifacts/manifest/wallet-validation-checklist.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true

  quality-gate-merge:
    name: Quality Gate - Merge (Stages 1-7)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs:
      - stage-1-static-checks
      - stage-2-build-artifacts
      - stage-3-unit-tests
      - stage-4-integration-bootstrap
      - stage-5-contract-tests
      - stage-6-e2e-smoke
      - stage-7-packaging-verification
      - stage-7b-fallback-compose-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Confirm merge quality gate
        run: echo "Stages 1 through 7 plus Stage 7b fallback compose bundle passed. Merge quality gate satisfied."

  quality-gate-release:
    name: Quality Gate - Release (Stage 8)
    if: github.event_name == 'release'
    needs:
      - stage-8-release-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Confirm release quality gate
        run: echo "Stage 8 passed. Release quality gate satisfied."
